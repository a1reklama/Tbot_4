<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>12</title>
  <style>
    :root{
      --bg:#f5f5f7;
      --sheet:rgba(255,255,255,.84);
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(60,60,67,.18);
      --blue:#0a84ff;
      --blue-strong:#0071e3;
      --blue-soft:rgba(10,132,255,.10);
      --grey-soft:rgba(60,60,67,.06);
      --danger:#c9342f;
      --shadow:0 18px 40px rgba(0,0,0,.08);
      --r-xl:28px;
      --r-lg:22px;
      --tap:52px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0}
    body{
      min-height:100vh;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      background:
        radial-gradient(1200px 700px at 0% -10%, #ffffff 0, #f5f5f7 45%, #edf1f5 100%);
    }
    .app{max-width:860px;margin:0 auto;padding:0 0 28px}
    .shell{
      background:var(--sheet);
      backdrop-filter:saturate(180%) blur(20px);
      border:1px solid rgba(255,255,255,.72);
      box-shadow:var(--shadow);
      overflow:hidden;
      min-height:100vh;
    }
    .topbar{
      padding:14px 14px 10px;
      border-bottom:1px solid rgba(60,60,67,.08);
      background:rgba(255,255,255,.58);
      position:sticky; top:0; z-index:20;
      backdrop-filter:saturate(180%) blur(18px);
    }
    .titleRow{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .titleWrap{display:flex;align-items:center;gap:12px}
    .badge12{
      width:40px;height:40px;border-radius:50%;
      border:2px solid #c9342f;color:#c9342f;font-weight:700;
      display:flex;align-items:center;justify-content:center;
      font-size:22px;background:#fff;
      flex:0 0 auto;
    }
    .titleText{font-size:22px;font-weight:700;letter-spacing:-.03em}
    .stageName{font-size:13px;color:var(--muted)}
    .tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    button,a.btn{
      appearance:none;border:none;cursor:pointer;text-decoration:none;
      min-height:var(--tap);border-radius:999px;padding:0 18px;
      font-size:17px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;
      transition:transform .06s ease, background .16s ease, border-color .16s ease, box-shadow .16s ease,color .16s ease, opacity .16s ease;
    }
    button:active,a.btn:active{transform:scale(.985)}
    .primary{background:var(--blue);color:#fff}
    .primary:hover{background:var(--blue-strong)}
    .secondary{background:var(--grey-soft);color:var(--text)}
    .ghost{background:#fff;border:1px solid var(--line);color:var(--text)}
    .danger{background:#fff;border:1px solid rgba(201,52,47,.18);color:var(--danger)}
    .small{min-height:38px;padding:0 14px;font-size:15px}
    .progressWrap{padding:12px 14px 0}
    .progressMeta{display:flex;justify-content:space-between;gap:10px;font-size:13px;color:var(--muted);margin-bottom:8px}
    .progress{height:8px;background:rgba(60,60,67,.08);border-radius:999px;overflow:hidden}
    .progress>span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--blue),#61b0ff);transition:width .25s ease}
    .screen{padding:18px 14px 12px}
    .eyebrow{font-size:13px;color:var(--muted);margin-bottom:8px}
    h1{font-size:30px;line-height:1.08;letter-spacing:-.03em;margin:0 0 10px}
    .desc{font-size:16px;line-height:1.5;color:var(--muted);margin:0 0 16px}
    .card{
      background:var(--card);
      border:1px solid rgba(60,60,67,.1);
      border-radius:var(--r-xl);
      padding:18px;
      box-shadow:0 8px 24px rgba(17,17,17,.04);
      margin-bottom:14px;
    }
    .compact{padding:14px}
    input[type=text]{
      width:100%;min-height:58px;border-radius:18px;border:1px solid var(--line);
      padding:0 16px;font-size:19px;outline:none;background:#fff;color:var(--text)
    }
    input[type=text]:focus{border-color:rgba(10,132,255,.45);box-shadow:0 0 0 4px rgba(10,132,255,.12)}
    .hint{margin-top:10px;font-size:14px;color:var(--muted);line-height:1.45}
    .error{margin-top:12px;padding:14px 16px;border-radius:18px;background:#fff5f4;border:1px solid rgba(201,52,47,.16);color:var(--danger);font-size:14px;line-height:1.45}
    .scoreGrid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}
    .scoreBtn{
      min-height:58px;border-radius:18px;background:#fff;border:1px solid var(--line);
      font-size:20px;font-weight:700;box-shadow:0 1px 0 rgba(255,255,255,.7) inset
    }
    .scoreBtn.active{background:#111;color:#fff;border-color:#111}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{
      min-height:38px;padding:0 14px;border-radius:999px;background:#fff;border:1px solid var(--line);
      font-size:15px;font-weight:600
    }
    .chip.on{background:#111;color:#fff;border-color:#111}
    .chip.soft{background:var(--blue-soft);border-color:transparent;color:var(--blue-strong)}
    .sectionTitle{font-size:16px;font-weight:700;margin-bottom:10px}
    .list{display:grid;gap:10px}
    .row{
      display:flex;justify-content:space-between;align-items:center;gap:10px;
      padding:14px 16px;border-radius:20px;background:#fff;border:1px solid var(--line)
    }
    .row .name{font-weight:600}
    .row .meta{font-size:13px;color:var(--muted);margin-top:3px}
    .row strong{font-size:18px}
    .questionNo{font-size:13px;color:var(--muted);margin-bottom:10px}
    .questionText{font-size:28px;line-height:1.14;letter-spacing:-.03em;font-weight:700}
    .answers{display:grid;gap:10px;margin-top:16px}
    .answers button{width:100%;background:#fff;border:1px solid var(--line);color:var(--text)}
    .summaryGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .summaryCard{
      padding:16px;border-radius:24px;background:#fff;border:1px solid var(--line);
      transition:transform .16s ease, box-shadow .16s ease;
    }
    .summaryCard .k{font-size:14px;color:var(--muted);margin-bottom:8px}
    .summaryCard .v{font-size:36px;font-weight:700;letter-spacing:-.04em}
    .tone-low{background:linear-gradient(180deg,#fff,#fbfbfc)}
    .tone-mid{background:linear-gradient(180deg,#fff,#f7fbff)}
    .tone-high{background:linear-gradient(180deg,#fff,#f2f9ff); border-color:rgba(10,132,255,.18)}
    .heroScore{
      padding:18px;border-radius:28px;background:linear-gradient(180deg,#fff,#f6fbff);
      border:1px solid rgba(10,132,255,.16)
    }
    .heroScore .big{font-size:56px;font-weight:700;letter-spacing:-.06em;line-height:1}
    .heroScore .sub{font-size:14px;color:var(--muted);margin-top:10px;line-height:1.45}
    .shareBox{display:grid;gap:10px;margin-top:14px}
    .sharePreview{
      padding:16px;border-radius:22px;background:#fff;border:1px solid var(--line);
      white-space:pre-line;font-size:16px;line-height:1.5
    }
    .footerSpace{height:94px}
    .stickyNav{
      position:fixed;left:50%;transform:translateX(-50%);
      bottom:12px;width:min(840px, calc(100vw - 20px));z-index:30;
    }
    .navCard{
      background:rgba(255,255,255,.9);
      backdrop-filter:saturate(180%) blur(22px);
      border:1px solid rgba(60,60,67,.12);
      border-radius:28px;padding:10px;display:flex;gap:10px;
      box-shadow:0 14px 34px rgba(0,0,0,.1)
    }
    .navCard>*{flex:1}
    .modalWrap{position:fixed;inset:0;background:rgba(0,0,0,.34);display:none;align-items:flex-end;justify-content:center;z-index:100}
    .modalWrap.show{display:flex}
    .modal{
      width:min(760px,100%);background:#fff;border-radius:30px 30px 0 0;padding:18px 16px 22px;
      max-height:86vh;overflow:auto;box-shadow:0 -10px 30px rgba(0,0,0,.18)
    }
    .grab{width:44px;height:5px;border-radius:999px;background:#d2d2d7;margin:2px auto 14px}
    .modal h3{margin:0 0 10px;font-size:24px;letter-spacing:-.03em}
    .modal p{margin:0 0 12px;color:var(--muted);line-height:1.5}
    .muted{color:var(--muted)}
    .memoryGroup{margin-top:14px}
    .memoryGroup:first-of-type{margin-top:0}
    .memoryItem{
      display:flex;justify-content:space-between;align-items:center;gap:10px;
      padding:12px 0;border-bottom:1px solid rgba(60,60,67,.08)
    }
    .memoryItem:last-child{border-bottom:none}
    .tinyBtn{
      min-height:32px;padding:0 12px;font-size:14px;border-radius:999px;background:#fff;border:1px solid var(--line)
    }
    .empty{color:var(--muted);font-size:15px}
    @media (max-width:720px){
      .shell{border-radius:0}
      .screen,.topbar,.progressWrap{padding-left:12px;padding-right:12px}
      h1{font-size:27px}
      .questionText{font-size:24px}
      .scoreGrid{grid-template-columns:repeat(4,minmax(0,1fr))}
      .summaryGrid{grid-template-columns:1fr}
      .stickyNav{width:calc(100vw - 12px);bottom:6px}
      .navCard{padding:8px;border-radius:24px}
      .navCard>*{min-height:50px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <div class="topbar">
        <div class="titleRow">
          <div class="titleWrap">
            <div class="badge12">12</div>
            <div class="titleText">Тест 12</div>
          </div>
          <div class="stageName" id="stageName">Семья</div>
        </div>
        <div class="tools">
          <button class="ghost small" id="helpBtn">Поддержка</button>
          <button class="ghost small" id="videoBtn">Инструкция</button>
          <button class="ghost small" id="memoryBtn">Имена</button>
          <button class="danger small" id="restartTop">Сбросить всё</button>
        </div>
      </div>

      <div class="progressWrap">
        <div class="progressMeta">
          <div id="progressLabel">Семья</div>
          <div id="progressStage">1 из 5</div>
        </div>
        <div class="progress"><span id="progressBar"></span></div>
      </div>

      <div id="appRoot"></div>
    </div>
  </div>

  <div class="modalWrap" id="modalWrap">
    <div class="modal">
      <div class="grab"></div>
      <div id="modalContent"></div>
      <button class="primary" id="closeModal" style="width:100%;margin-top:10px">Закрыть</button>
    </div>
  </div>

<script>
const SUPPORT_URL = "";
const VIDEO_URL = "";
const SUPPORT_TEXT = "Здесь можно разместить ссылку на группу поддержки, чат с куратором или короткую памятку, куда обратиться.";
const VIDEO_TEXT = "Здесь можно разместить ссылку на видеоинструкцию или короткий текст о том, как правильно проходить тест.";

const STORAGE_KEYS = {
  family: 't12_saved_family_names_v1',
  work: 't12_saved_work_names_v1',
  society: 't12_saved_society_names_v1'
};

const societyPresets = [
  'Соседи','Курьеры','Кассиры в супермаркете','Люди в очередях','Работники сферы обслуживания',
  'Сотрудники банка','Прохожие на улице','Люди в транспорте','Водители соседних машин',
  'Полиция','Чиновники','Врачи','Таксисты','Продавцы','Официанты','Охранники'
];
const selfQuestions = [
  'Когда мне плохо, обращаюсь ли я сразу к врачу?',
  'Ем ли я здоровую еду?',
  'Поддерживаю ли я режим регулярного питания?',
  'Соблюдаю ли я личную гигиену, чищу ли я зубы утром и вечером?',
  'Активен ли я физически, насколько часто я занимаюсь спортом или делаю зарядку?',
  'Есть ли у меня хобби, какие-то увлечения помимо работы?',
  'Есть ли у меня друзья, провожу ли я с ними время?',
  'Верю ли я, что существует что-то невидимое и доброе, что помогает мне каждый день?',
  'Обращаюсь ли я ежедневно к Богу, или к какой-то высшей силе?',
  'Употребляю ли я наркотики?',
  'Напиваюсь ли я регулярно?',
  'Играю ли я в азартные игры?',
  'Делаю ли я ставки?',
  'Изменяю ли я любимому человеку?',
  'Применяю ли я насилие над кем-либо — эмоциональное или физическое?',
  'Присваиваю ли я чужие деньги?',
  'Торчу ли я на интернет порно?',
  'Трачу ли я больше часа в день на чтение новостей?',
  'Залипаю ли я в социальных сетях или в мессенджерах?',
  'Курю ли я?',
  'Пью ли я без меры кофе или энергетики?',
  'Страдаю ли я от трудоголизма?',
  'Страдаю ли я от беспорядочного секса?',
  'Беру ли я в долг?',
  'Вёлся ли я словами или действиями на какую-то другую одержимость?'
];
const yesNoQuestions = new Set([
  'Употребляю ли я наркотики?','Напиваюсь ли я регулярно?','Играю ли я в азартные игры?','Делаю ли я ставки?',
  'Изменяю ли я любимому человеку?','Применяю ли я насилие над кем-либо — эмоциональное или физическое?',
  'Присваиваю ли я чужие деньги?','Торчу ли я на интернет порно?','Трачу ли я больше часа в день на чтение новостей?',
  'Залипаю ли я в социальных сетях или в мессенджерах?','Курю ли я?','Пью ли я без меры кофе или энергетики?',
  'Страдаю ли я от трудоголизма?','Страдаю ли я от беспорядочного секса?','Беру ли я в долг?',
  'Вёлся ли я словами или действиями на какую-то другую одержимость?'
]);
const hardZeroQuestions = new Set(['Употребляю ли я наркотики?','Напиваюсь ли я регулярно?']);
const capAtThreeQuestions = new Set(['Курю ли я?','Вёлся ли я словами или действиями на какую-то другую одержимость?']);
const obsessionQuestions = [
  'Употребляю ли я наркотики?','Напиваюсь ли я регулярно?','Играю ли я в азартные игры?','Делаю ли я ставки?',
  'Изменяю ли я любимому человеку?','Применяю ли я насилие над кем-либо — эмоциональное или физическое?',
  'Присваиваю ли я чужие деньги?','Торчу ли я на интернет порно?','Трачу ли я больше часа в день на чтение новостей?',
  'Залипаю ли я в социальных сетях или в мессенджерах?','Курю ли я?','Пью ли я без меры кофе или энергетики?',
  'Страдаю ли я от трудоголизма?','Страдаю ли я от беспорядочного секса?','Беру ли я в долг?',
  'Вёлся ли я словами или действиями на какую-то другую одержимость?'
];
const freqOptions = ['Никогда','Редко','Иногда','Часто','Всегда'];
const ynOptions = ['Да','Нет'];

const state = {
  stage:1,
  familyItems:[],
  workItems:[],
  familyDraftName:'',
  workDraftName:'',
  societySelected:societyPresets[0],
  societyScores:{},
  customSocietyName:'',
  selfAnswers:{},
  error:''
};

function esc(s){
  return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
}
function mean(values){
  const filtered = values.filter(v => typeof v === 'number' && Number.isFinite(v) && v >= 0);
  if (!filtered.length) return 0;
  return Math.round(filtered.reduce((a,b)=>a+b,0)/filtered.length);
}
function scoreTone(score){
  if (score >= 8) return 'tone-high';
  if (score >= 4) return 'tone-mid';
  return 'tone-low';
}
function mapAnswerToScore(question, answer){
  if (!answer) return 0;
  if (yesNoQuestions.has(question)) return answer === 'Нет' ? 10 : 0;
  const m = {'Никогда':0,'Редко':3,'Иногда':5,'Часто':8,'Всегда':10};
  return m[answer] ?? 0;
}
function calculateSelfScore(selfAnswers){
  const baseAverage = mean(Object.entries(selfAnswers).map(([q,a])=>mapAnswerToScore(q,a)));
  if ([...hardZeroQuestions].some(q => selfAnswers[q] === 'Да')) return 0;
  const obsessionCount = obsessionQuestions.filter(q => selfAnswers[q] === 'Да').length;
  if (obsessionCount >= 4) return 0;
  if ([...capAtThreeQuestions].some(q => selfAnswers[q] === 'Да')) return Math.min(baseAverage, 3);
  return baseAverage;
}
function familyScore(){ return mean(state.familyItems.map(x=>x.score)); }
function workScore(){ return mean(state.workItems.map(x=>x.score)); }
function societyScore(){ return mean(Object.values(state.societyScores)); }
function selfScore(){ return calculateSelfScore(state.selfAnswers); }
function totalScore(){ return mean([familyScore(), workScore(), societyScore(), selfScore()]); }
function stageTitle(){ return {1:'Семья',2:'Работа / учёба',3:'Общество',4:'Личное выздоровление',5:'Результат'}[state.stage]; }
function progressValue(){
  if (state.stage === 1) return 20;
  if (state.stage === 2) return 40;
  if (state.stage === 3) return 60;
  if (state.stage === 4) return 80 + Math.round((Object.keys(state.selfAnswers).length / selfQuestions.length) * 20);
  return 100;
}
function updateProgress(){
  document.getElementById('stageName').textContent = stageTitle();
  document.getElementById('progressLabel').textContent = stageTitle();
  document.getElementById('progressStage').textContent = `${state.stage} из 5`;
  document.getElementById('progressBar').style.width = progressValue() + '%';
}
function safeLoad(key){
  try{
    const raw = localStorage.getItem(key);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  }catch(e){ return []; }
}
function safeSave(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){}
}
function getSavedNames(group){ return safeLoad(STORAGE_KEYS[group]); }
function rememberName(group, name){
  const clean = String(name || '').trim();
  if (!clean) return;
  const list = getSavedNames(group).filter(x => x !== clean);
  list.unshift(clean);
  safeSave(STORAGE_KEYS[group], list.slice(0, 20));
}
function removeSavedName(group, name){
  safeSave(STORAGE_KEYS[group], getSavedNames(group).filter(x => x !== name));
}
function clearAllSavedNames(){
  Object.values(STORAGE_KEYS).forEach(k => {
    try{ localStorage.removeItem(k); }catch(e){}
  });
}
function restartAll(){
  state.stage=1;
  state.familyItems=[];
  state.workItems=[];
  state.familyDraftName='';
  state.workDraftName='';
  state.societySelected=societyPresets[0];
  state.societyScores={};
  state.customSocietyName='';
  state.selfAnswers={};
  state.error='';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function resetCurrentStage(){
  state.error='';
  if (state.stage === 1){ state.familyItems=[]; state.familyDraftName=''; }
  if (state.stage === 2){ state.workItems=[]; state.workDraftName=''; }
  if (state.stage === 3){ state.societyScores={}; state.customSocietyName=''; state.societySelected=societyPresets[0]; }
  if (state.stage === 4){ state.selfAnswers={}; }
  render();
}
function nextStage(){
  state.error='';
  state.stage = Math.min(5, state.stage + 1);
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function currentQuestionInfo(){
  const idx = selfQuestions.findIndex(q => !state.selfAnswers[q]);
  if (idx === -1) return { index:-1, q:null, options:[] };
  const q = selfQuestions[idx];
  return { index:idx, q, options: yesNoQuestions.has(q) ? ynOptions : freqOptions };
}
function addFamily(name, score){
  const n = String(name || '').trim();
  if (!n){ state.error='Сначала введи имя или степень родства.'; render(); return; }
  state.familyItems.push({name:n, score});
  rememberName('family', n);
  state.familyDraftName='';
  state.error='';
  render();
  const i = document.getElementById('familyName'); if (i) i.focus();
}
function addWork(name, score){
  const n = String(name || '').trim();
  if (!n){ state.error='Сначала введи роль или имя человека.'; render(); return; }
  state.workItems.push({name:n, score});
  rememberName('work', n);
  state.workDraftName='';
  state.error='';
  render();
  const i = document.getElementById('workName'); if (i) i.focus();
}
function addCustomSociety(name, score){
  const n = String(name || '').trim();
  if (!n){ state.error='Сначала введи название своей категории.'; render(); return; }
  state.societyScores[n] = score;
  rememberName('society', n);
  state.customSocietyName='';
  state.error='';
  render();
}
function shareText(){
  return `Мой результат в тесте 12:\n\nВыздоровление в семье: ${familyScore()}\nВыздоровление на работе: ${workScore()}\nВыздоровление в обществе: ${societyScore()}\nЛичное выздоровление: ${selfScore()}\n\nИтого качество твоего выздоровления: ${totalScore()}`;
}
async function shareResult(){
  const text = shareText();
  try{
    if (navigator.share){
      await navigator.share({ title: 'Тест 12', text });
      return;
    }
    await copyResult();
  }catch(e){}
}
async function copyResult(){
  const text = shareText();
  try{
    await navigator.clipboard.writeText(text);
    openModal('Скопировано', '<p>Текст результата скопирован. Теперь его можно вставить в Telegram или куда угодно.</p>');
  }catch(e){
    openModal('Текст результата', `<div class="sharePreview">${esc(text)}</div>`);
  }
}
function openModal(title, bodyHtml){
  document.getElementById('modalContent').innerHTML = `<h3>${title}</h3>${bodyHtml}`;
  document.getElementById('modalWrap').classList.add('show');
}
function closeModal(){ document.getElementById('modalWrap').classList.remove('show'); }

function suggestionChips(group, currentSetter){
  const names = getSavedNames(group);
  if (!names.length) return '';
  return `
    <div class="card compact">
      <div class="sectionTitle">Сохранённые имена</div>
      <div class="chips">
        ${names.map(name=>`<button class="chip soft" data-suggest-group="${group}" data-suggest-name="${esc(name)}">${esc(name)}</button>`).join('')}
      </div>
    </div>
  `;
}
function scoreGrid(kind, active=null){
  return `<div class="scoreGrid">
    ${Array.from({length:11},(_,i)=>`<button class="scoreBtn ${active===i?'active':''}" data-${kind}-score="${i}">${i}</button>`).join('')}
  </div>`;
}
function nav(primaryText='Завершить этап'){
  return `
    <div class="footerSpace"></div>
    <div class="stickyNav">
      <div class="navCard">
        <button class="secondary" id="clearStageBtn">Очистить этап</button>
        <button class="primary" id="nextBtn">${primaryText}</button>
      </div>
    </div>
  `;
}
function renderFamily(){
  return `
    <div class="screen">
      <div class="eyebrow">Этап 1</div>
      <h1>Семья</h1>
      <p class="desc">Введи имя или степень родства, затем выбери оценку от 0 до 10.</p>

      ${suggestionChips('family')}

      <div class="card">
        <input id="familyName" type="text" placeholder="Например: Мама" value="${esc(state.familyDraftName)}" />
        <div class="hint">Имя можно будет запомнить и использовать снова в следующий раз.</div>
        ${state.error ? `<div class="error">${esc(state.error)}</div>` : ''}
      </div>

      <div class="card">${scoreGrid('family')}</div>

      ${state.familyItems.length ? `
      <div class="list">
        ${state.familyItems.map(item=>`
          <div class="row">
            <div><div class="name">${esc(item.name)}</div><div class="meta">Семья</div></div>
            <strong>${item.score}</strong>
          </div>
        `).join('')}
      </div>` : ''}

      ${nav('Завершить этап')}
    </div>
  `;
}
function renderWork(){
  return `
    <div class="screen">
      <div class="eyebrow">Этап 2</div>
      <h1>Работа / учёба</h1>
      <p class="desc">Оцени отношения с людьми на работе или в учебном заведении.</p>

      ${suggestionChips('work')}

      <div class="card">
        <input id="workName" type="text" placeholder="Например: Начальник" value="${esc(state.workDraftName)}" />
        <div class="hint">Можно писать роль, имя или короткое описание.</div>
        ${state.error ? `<div class="error">${esc(state.error)}</div>` : ''}
      </div>

      <div class="card">${scoreGrid('work')}</div>

      ${state.workItems.length ? `
      <div class="list">
        ${state.workItems.map(item=>`
          <div class="row">
            <div><div class="name">${esc(item.name)}</div><div class="meta">Работа / учёба</div></div>
            <strong>${item.score}</strong>
          </div>
        `).join('')}
      </div>` : ''}

      ${nav('Завершить этап')}
    </div>
  `;
}
function renderSociety(){
  const selectedScore = Object.prototype.hasOwnProperty.call(state.societyScores, state.societySelected) ? state.societyScores[state.societySelected] : null;
  return `
    <div class="screen">
      <div class="eyebrow">Этап 3</div>
      <h1>Общество</h1>
      <p class="desc">Выбери категорию и сразу поставь оценку. При желании можно добавить свою.</p>

      <div class="card compact">
        <div class="chips">
          ${societyPresets.map(name=>`<button class="chip ${state.societySelected===name?'on':''}" data-preset="${esc(name)}">${esc(name)}</button>`).join('')}
        </div>
      </div>

      <div class="card">
        <div class="sectionTitle">${esc(state.societySelected)}</div>
        <div class="hint" style="margin-top:0;margin-bottom:12px">Можно выбрать оценку или пропустить.</div>
        <div class="tools" style="margin:0 0 12px">
          <button class="secondary small" id="skipSocietyBtn">Пропустить</button>
        </div>
        ${scoreGrid('society', selectedScore)}
      </div>

      ${suggestionChips('society')}

      <div class="card">
        <input id="customSocietyName" type="text" placeholder="Своя категория, например: Дворник" value="${esc(state.customSocietyName)}" />
        <div class="hint">Если стандартной категории нет, введи свою и выбери оценку ниже.</div>
        ${state.error ? `<div class="error">${esc(state.error)}</div>` : ''}
        <div style="margin-top:12px">${scoreGrid('custom')}</div>
      </div>

      ${Object.keys(state.societyScores).length ? `
      <div class="list">
        ${Object.entries(state.societyScores).map(([k,v])=>`
          <div class="row">
            <div><div class="name">${esc(k)}</div><div class="meta">Общество</div></div>
            <strong>${v === -1 ? '—' : v}</strong>
          </div>
        `).join('')}
      </div>` : ''}

      ${nav('Завершить этап')}
    </div>
  `;
}
function renderSelf(){
  const q = currentQuestionInfo();
  return `
    <div class="screen">
      <div class="eyebrow">Этап 4</div>
      <h1>Личное выздоровление</h1>
      <p class="desc">Отвечай на один вопрос за раз. Интерфейс не мешает, вся логика расчёта сохранена.</p>

      ${q.q ? `
      <div class="card">
        <div class="questionNo">Вопрос ${q.index + 1} из ${selfQuestions.length}</div>
        <div class="questionText">${esc(q.q)}</div>
        <div class="answers">
          ${q.options.map(opt=>`<button data-answer="${esc(opt)}">${esc(opt)}</button>`).join('')}
        </div>
      </div>` : `
      <div class="card">
        <div style="font-size:24px;font-weight:700">Все вопросы заполнены</div>
      </div>`}

      ${nav('Завершить этап')}
    </div>
  `;
}
function renderResult(){
  const text = shareText();
  return `
    <div class="screen">
      <div class="eyebrow">Этап 5</div>
      <h1>Результат</h1>
      <p class="desc">Только текущий срез на сегодня. При желании результат можно сразу отправить или скопировать.</p>

      <div class="heroScore">
        <div class="stageName">Итоговый уровень</div>
        <div class="big">${totalScore()}</div>
        <div class="sub">Результат выглядит спокойно и нейтрально: без красных оценок и без давления.</div>
      </div>

      <div class="summaryGrid" style="margin-top:14px">
        <div class="summaryCard ${scoreTone(familyScore())}"><div class="k">Семья</div><div class="v">${familyScore()}</div></div>
        <div class="summaryCard ${scoreTone(workScore())}"><div class="k">Работа / учёба</div><div class="v">${workScore()}</div></div>
        <div class="summaryCard ${scoreTone(societyScore())}"><div class="k">Общество</div><div class="v">${societyScore()}</div></div>
        <div class="summaryCard ${scoreTone(selfScore())}"><div class="k">Личное</div><div class="v">${selfScore()}</div></div>
      </div>

      <div class="shareBox">
        <button class="primary" id="shareBtn">Поделиться результатом</button>
        <button class="secondary" id="copyBtn">Скопировать текст</button>
        <div class="sharePreview">${esc(text)}</div>
      </div>
    </div>
  `;
}
function bindTopActions(){
  document.getElementById('restartTop').onclick = restartAll;
  document.getElementById('closeModal').onclick = closeModal;
  document.getElementById('modalWrap').onclick = (e)=>{ if (e.target.id === 'modalWrap') closeModal(); };

  document.getElementById('helpBtn').onclick = ()=>{
    const body = SUPPORT_URL
      ? `<p>Ниже можно перейти за поддержкой.</p><a class="btn primary" style="width:100%" href="${SUPPORT_URL}" target="_blank" rel="noopener">Открыть поддержку</a>`
      : `<p>${SUPPORT_TEXT}</p><p class="muted">Чтобы вставить живую ссылку, открой файл в редакторе и заполни переменную SUPPORT_URL в начале скрипта.</p>`;
    openModal('Поддержка', body);
  };

  document.getElementById('videoBtn').onclick = ()=>{
    const body = VIDEO_URL
      ? `<p>Ниже можно открыть инструкцию.</p><a class="btn primary" style="width:100%" href="${VIDEO_URL}" target="_blank" rel="noopener">Открыть инструкцию</a>`
      : `<p>${VIDEO_TEXT}</p><p class="muted">Чтобы вставить живую ссылку, открой файл в редакторе и заполни переменную VIDEO_URL в начале скрипта.</p>`;
    openModal('Инструкция', body);
  };

  document.getElementById('memoryBtn').onclick = ()=>{
    const family = getSavedNames('family');
    const work = getSavedNames('work');
    const society = getSavedNames('society');

    function block(title, group, items){
      return `
        <div class="memoryGroup">
          <div class="sectionTitle">${title}</div>
          ${items.length ? items.map(name=>`
            <div class="memoryItem">
              <div>${esc(name)}</div>
              <button class="tinyBtn" data-remove-memory="${group}" data-remove-name="${esc(name)}">Удалить</button>
            </div>
          `).join('') : `<div class="empty">Пока пусто</div>`}
        </div>
      `;
    }

    const body = `
      <p>Здесь хранятся подсказки имён и категорий для следующих прохождений.</p>
      ${block('Семья', 'family', family)}
      ${block('Работа / учёба', 'work', work)}
      ${block('Свои категории', 'society', society)}
      <button class="danger" id="clearAllMemoryBtn" style="width:100%;margin-top:16px">Удалить все имена из памяти</button>
    `;
    openModal('Имена', body);

    document.querySelectorAll('[data-remove-memory]').forEach(btn => {
      btn.onclick = ()=>{
        removeSavedName(btn.dataset.removeMemory, btn.dataset.removeName);
        document.getElementById('memoryBtn').click();
      };
    });
    document.getElementById('clearAllMemoryBtn').onclick = ()=>{
      clearAllSavedNames();
      closeModal();
      openModal('Имена очищены', '<p>Все сохранённые имена и свои категории удалены из памяти устройства.</p>');
      render();
    };
  };
}
function bindSuggestions(){
  document.querySelectorAll('[data-suggest-group]').forEach(btn => {
    btn.onclick = ()=>{
      const group = btn.dataset.suggestGroup;
      const name = btn.dataset.suggestName;
      if (group === 'family'){ state.familyDraftName = name; render(); }
      if (group === 'work'){ state.workDraftName = name; render(); }
      if (group === 'society'){ state.customSocietyName = name; render(); }
    };
  });
}
function render(){
  updateProgress();
  const root = document.getElementById('appRoot');

  if (state.stage === 1) root.innerHTML = renderFamily();
  if (state.stage === 2) root.innerHTML = renderWork();
  if (state.stage === 3) root.innerHTML = renderSociety();
  if (state.stage === 4) root.innerHTML = renderSelf();
  if (state.stage === 5) root.innerHTML = renderResult();

  bindTopActions();
  bindSuggestions();

  if (state.stage === 1){
    const input = document.getElementById('familyName');
    input.focus();
    input.oninput = e => state.familyDraftName = e.target.value;
    document.querySelectorAll('[data-family-score]').forEach(btn => btn.onclick = ()=>addFamily(state.familyDraftName, Number(btn.dataset.familyScore)));
    document.getElementById('clearStageBtn').onclick = resetCurrentStage;
    document.getElementById('nextBtn').onclick = nextStage;
  }

  if (state.stage === 2){
    const input = document.getElementById('workName');
    input.focus();
    input.oninput = e => state.workDraftName = e.target.value;
    document.querySelectorAll('[data-work-score]').forEach(btn => btn.onclick = ()=>addWork(state.workDraftName, Number(btn.dataset.workScore)));
    document.getElementById('clearStageBtn').onclick = resetCurrentStage;
    document.getElementById('nextBtn').onclick = nextStage;
  }

  if (state.stage === 3){
    document.querySelectorAll('[data-preset]').forEach(btn => btn.onclick = ()=>{ state.societySelected = btn.dataset.preset; state.error=''; render(); });
    document.querySelectorAll('[data-society-score]').forEach(btn => btn.onclick = ()=>{ state.societyScores[state.societySelected] = Number(btn.dataset.societyScore); state.error=''; render(); });
    document.querySelectorAll('[data-custom-score]').forEach(btn => btn.onclick = ()=>addCustomSociety(state.customSocietyName, Number(btn.dataset.customScore)));
    document.getElementById('skipSocietyBtn').onclick = ()=>{ state.societyScores[state.societySelected] = -1; state.error=''; render(); };
    const input = document.getElementById('customSocietyName');
    input.oninput = e => state.customSocietyName = e.target.value;
    document.getElementById('clearStageBtn').onclick = resetCurrentStage;
    document.getElementById('nextBtn').onclick = nextStage;
  }

  if (state.stage === 4){
    document.querySelectorAll('[data-answer]').forEach(btn => btn.onclick = ()=>{
      const q = currentQuestionInfo().q;
      if (q){ state.selfAnswers[q] = btn.dataset.answer; state.error=''; render(); }
    });
    document.getElementById('clearStageBtn').onclick = resetCurrentStage;
    document.getElementById('nextBtn').onclick = nextStage;
  }

  if (state.stage === 5){
    document.getElementById('shareBtn').onclick = shareResult;
    document.getElementById('copyBtn').onclick = copyResult;
  }
}
render();
</script>
</body>
</html>
